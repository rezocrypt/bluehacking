<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallpaper</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: url("https://example.com/your-image.jpg") center/cover no-repeat;
    }

    .center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #00ff66;
      font-family: monospace;
      font-size: 48px;
      text-align: center;
      text-shadow: 0 0 10px #00ff66, 0 0 25px #00ff66;
      white-space: nowrap;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="center-text">
    hackers are not born<br>
    they are made<span class="cursor">_</span>
  </div>

</body>
</html>
